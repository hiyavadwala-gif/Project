
<!DOCTYPE html>
<html>
<head>
  <title>Fetch API Table</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #af4c7c;
      color: white;
    }
    button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>User List</h2>
  <button onclick="fetchUsers()">Load Users</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>City</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      
    </tbody>
  </table>

<script>
    async function fetchUsers() {
  try {
    const response = await fetch("");
    const users = await response.json();

    const tableBody = document.getElementById("userTableBody");
    tableBody.innerHTML = "";

   setTimeout(() => {
     users.forEach(user => {
      const row = `
        <tr>
          <td>${user.id}</td>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.address.city}</td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });
   }, 1000);

  } catch (error) {
    console.error("Error fetching users:", error);
  }
}
</script>
</body>
</html>
