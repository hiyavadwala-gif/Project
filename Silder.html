<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="slider.css">
</head>

<body>
    <div class="slideshow-container">

        <div class="slider">
            <div class="slide">
                <img src="../Css/Assest/Images/Images/Butterfly img5 .jpg.jpg" alt="">
            </div>
            <div class="slide">
                <img src="../Css/Assest/Images/Images/sun set image1.webp" alt="">
            </div>
            <div class="slide"><img src="../Css/Assest/Images/Images/water img3.jpg" alt=""></div>
            <div class="slide"> <img src="../Css/Assest/Images/Images/car img7.jpg" alt=""></div>
        </div>
    </div>

    <div class="controls">    
        <button onclick="prevslide()">Prev</button>
        <button onclick="nextSlide()">Next</button>
    </div>  





 <script>
          const track = document.querySelector(".slider-track");
          const slides = document.querySelectorAll(".slide");
          const totalSlides = slides.length;

          let index = 0;
          let interval;

          function updateSlide() {
            track.style.transform = `translateX(-${index * 100}%)`;
          }

          function nextSlide() {
            index++;
            if (index >= totalSlides) {
              index = 0;
              track.style.transition = "none";
              updateSlide();
              requestAnimationFrame(() => {
                track.style.transition = "transform 0.6s ease-in-out";
              });
              return;
            }
            updateSlide();
          }

          function prevSlide() {
            index--;
            if (index < 0) {
              index = totalSlides - 1;
            }
            updateSlide();
          }

          function startAutoSlide() {
            interval = setInterval(nextSlide, 3000);
          }

          function stopAutoSlide() {
            clearInterval(interval);
          }

          const slider = document.querySelector(".slideshow-container");
          slider.addEventListener("mouseenter", stopAutoSlide);
          slider.addEventListener("mouseleave", startAutoSlide);

          startAutoSlide();
        </script>
</body>
</html>
